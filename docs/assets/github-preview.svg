<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Fitness Coach product preview</title>
  <desc id="desc">A premium fitness software dashboard showing a five video onboarding flow.</desc>
  <rect width="1280" height="720" fill="#f7f7f4"/>
  <rect x="52" y="52" width="1176" height="616" rx="18" fill="#ffffff" stroke="#dedede"/>
